# Detection & Violation Thresholds
detection:
  min_confidence: 0.5
  nms_iou: 0.45
  min_box_area: 500

speed:
  residential_limit: 40
  city_limit: 60
  highway_limit: 120
  school_zone_limit: 30

violations:
  severity:
    speed_excess_low: 10      # km/h over
    speed_excess_medium: 20
    speed_excess_high: 40
  
  cooldown_seconds: 10
  min_track_frames: 10

prediction:
  ttc_warning: 3.0    # seconds
  ttc_critical: 1.5
  proximity_px: 100
