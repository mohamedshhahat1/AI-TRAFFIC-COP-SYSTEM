# AI Traffic Cop System - Main Settings
system:
  name: "AI Traffic Cop System"
  version: "1.0.0"
  debug: false
  log_level: "INFO"

camera:
  source: "data/videos/sample.mp4"
  resolution: [1280, 720]
  fps: 30

detection:
  model: "yolov8n"
  confidence: 0.5
  device: "auto"

tracking:
  max_age: 30
  embedder: "mobilenet"

speed:
  limit: 60
  tolerance: 5
  pixel_to_meter: 0.05

violations:
  speed_enabled: true
  red_light_enabled: true
  lane_enabled: true
  parking_enabled: true
  max_stationary_seconds: 30
