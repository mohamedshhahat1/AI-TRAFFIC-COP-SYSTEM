version: "3.8"

services:
  # AI Traffic Cop Backend
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: traffic-cop-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite+aiosqlite:///./data/traffic_cop.db
      - DEBUG=false
    volumes:
      - ../data:/app/data
      - ../models:/app/models
    restart: unless-stopped

  # Frontend (React)
  frontend:
    image: node:18-alpine
    container_name: traffic-cop-frontend
    working_dir: /app
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_URL=http://localhost:8000/api
    volumes:
      - ../frontend:/app
      - frontend_modules:/app/node_modules
    depends_on:
      - api

volumes:
  frontend_modules:
