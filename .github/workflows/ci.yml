name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff
      - name: Lint with ruff
        run: ruff check . --ignore E501

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx
      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=backend --cov=ai_engine --cov-report=term-missing
      - name: Check coverage threshold
        run: |
          pytest tests/ --cov=backend --cov=ai_engine --cov-fail-under=30

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -f docker/Dockerfile -t ai-traffic-cop:test .
      - name: Verify image
        run: |
          docker run --rm ai-traffic-cop:test python -c "import backend; print('OK')"
