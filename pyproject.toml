[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks integration tests",
]
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
source = ["backend", "ai_engine"]
omit = [
    "*/tests/*",
    "*/__pycache__/*",
    "scripts/*",
]

[tool.coverage.report]
fail_under = 30
show_missing = true
